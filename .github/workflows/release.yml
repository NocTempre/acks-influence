name: Release

# Cut a release by pushing a version tag, e.g.:
#   git tag v1.0.0 && git push origin v1.0.0
# This builds module.zip and attaches module.json + module.zip to the GitHub
# release, which the manifest URL below resolves to:
#   https://github.com/NocTempre/acks-influence/releases/latest/download/module.json

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify tag matches module.json version
        run: |
          MANIFEST_VERSION=$(node -p "require('./module.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "manifest=$MANIFEST_VERSION  tag=$TAG_VERSION"
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::module.json version ($MANIFEST_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Build compendium pack
        run: |
          npm install
          npm run build:packs

      - name: Create module.zip
        run: |
          zip -r module.zip \
            module.json \
            scripts \
            templates \
            styles \
            lang \
            packs/proficiencies \
            README.md \
            docs

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            module.json
            module.zip
